<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{box-sizing: border-box;margin: 0;padding: 0;}
        body{background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .clase{
            width: 40%;height: 400px;    
            background: #212121; 
            border-radius: 14px;
            z-index: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transform-style: preserve-3d;
            perspective: 1000px;
            padding: 50px;
        }
        .js-tilt-glare{border-radius: 14px;}
        .a1{color: #ffff; z-index: 1; transform: translateZ(50px);}
        h1{color: #ffff; z-index: 2; transform: translateZ(40px);}
        .a2{
            background: coral; z-index: 3; transform: translateZ(30px);width: 100px; 
            height: 100px;border-radius: 50%;
            transition: all 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="your-element clase" data-tilt data-tilt-glare data-tilt-max-glare="0.5">
        <a class="a1" href="">Link de ingreso</a>
        <h1>Lorem ipsum dolor sit amet consectetur.</h1>
        <a href="" class="a2"></a>
    </div>
    
    <!-- at the end of the body -->
    <script src="vanilla-tilt.js"></script>
</body>
</html>
